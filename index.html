<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Barbosa</title>
  <style>
    :root{
      --paper: #f5efe5;
      --paper-2: #faf6ef;
      --ink: #171412;
      --muted: #6b625a;
      --blue: #2f63d6;
      --yellow: #f4ea83;
      --line: rgba(0,0,0,.10);
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html, body{
      width:100%;
      min-height:100%;
    }

    body{
      min-height:100dvh;
      width:100vw;
      font-family: Arial, Helvetica, sans-serif;
      color:var(--ink);
      background:
        radial-gradient(circle at 14% 20%, rgba(255,245,200,.70), transparent 18%),
        radial-gradient(circle at 85% 78%, rgba(255,233,145,.55), transparent 16%),
        linear-gradient(135deg, #cdc8bf 0%, #f3efe8 44%, #d7d1c7 100%);
      overflow-x:hidden;
    }

    .page{
      width:100vw;
      min-height:100dvh;
    }

    .card{
      width:100%;
      min-height:100dvh;
      position:relative;
      overflow:hidden;
      border:0;
      border-radius:0;
      box-shadow:none;
      background:var(--paper);
    }

    .brand{
      position:absolute;
      top:18px;
      left:16px;
      z-index:5;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(32px, 8vw, 44px);
      line-height:1;
      letter-spacing:.5px;
      color:#efe56d;
      text-shadow:0 1px 0 rgba(0,0,0,.08);
      mix-blend-mode: screen;
      pointer-events:none;
    }

    .hero{
      position:relative;
      background:#111;
    }

    .hero-top{
      position:absolute;
      left:16px;
      right:16px;
      top:18px;
      z-index:4;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
    }

    .circle-logo{
      width:56px;
      height:56px;
      border-radius:50%;
      background:#f1f1f1;
      color:#111;
      display:grid;
      place-items:center;
      font-size:24px;
      font-weight:700;
      box-shadow:0 8px 18px rgba(0,0,0,.22);
    }

    .mini-tag{
      padding:8px 14px;
      border-radius:999px;
      background:rgba(79, 120, 255, .95);
      color:#fff;
      font-size:11px;
      font-weight:700;
      letter-spacing:1.5px;
      text-transform:uppercase;
      white-space:nowrap;
    }

    .hero-img{
      height: clamp(300px, 40vh, 520px);
      overflow:hidden;
    }

    .hero-img img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  /* Mude 'center top' para valores como '50% 30%' ou '50% 50%' */
  /* O primeiro valor é horizontal, o segundo é vertical */
  object-position: 50% 30%; 
}

    .hero-copy{
      background:var(--paper);
      padding:18px 18px 20px;
      display:grid;
      grid-template-columns:1.2fr .8fr;
      gap:18px;
      align-items:end;
    }

    .hero-copy h1{
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(24px, 3.2vw, 34px);
      line-height:.95;
      font-weight:400;
      letter-spacing:-.2px;
      color:#24201c;
      max-width:320px;
      text-transform:uppercase;
    }

    .hero-copy-right{
      display:flex;
      flex-direction:column;
      gap:10px;
      align-items:flex-start;
    }

    .hero-copy p{
      font-size:12px;
      line-height:1.45;
      color:var(--muted);
      max-width:180px;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:8px 14px;
      border-radius:999px;
      background:#f4ea83;
      color:#111;
      text-decoration:none;
      font-size:12px;
      font-weight:700;
      border:1px solid rgba(0,0,0,.10);
    }

    .nav{
      display:flex;
      justify-content:center;
      gap:18px;
      flex-wrap:wrap;
      padding:14px 16px 12px;
      background:#502F1F;
      border-top:1px solid rgba(255,255,255,.12);
    }

    .nav a{
      color:#fff;
      text-decoration:none;
      font-size:12px;
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:.8px;
      opacity:.95;
    }

    .nav a:hover{
      opacity:1;
      text-decoration:underline;
    }

    .services{
      background:var(--paper);
      border-top:1px solid var(--line);
    }

    .service-row{
      display:grid;
      grid-template-columns:42px 1fr 28px;
      align-items:center;
      gap:8px;
      padding:17px 16px;
      background:var(--paper);
      border-bottom:1px solid var(--line);
    }

    .service-row.alt{
      background:var(--paper-2);
      font-family:"Times New Roman", serif;
      font-style:italic;
    }

    .service-row span:first-child{
      font-size:12px;
      color:#7e746b;
    }

    .service-row h2{
      font-size:16px;
      letter-spacing:.4px;
      font-weight:700;
      color:#171717;
    }

    .arrow{
      text-align:right;
      font-size:20px;
      color:#333;
    }

    .bottom-grid{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:0;
      background:#000;
    }

    .bottom-grid .item{
      aspect-ratio:1 / 1.15;
      overflow:hidden;
    }

    .bottom-grid img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    @media (max-width:480px){
      .brand{
        font-size:28px;
      }

      .hero-copy{
        grid-template-columns:1fr;
      }

      .hero-copy-right p{
        max-width:100%;
      }

      .nav{
        gap:12px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="card">
      <div class="brand">Barbosa</div>

      <header class="hero">
        <div class="hero-top">
        </div>

        <div class="hero-img">
          <img src="1 (4).jpg" alt="Descrição da minha foto">
        </div>

        <div class="hero-copy">
          <h1>DESCOBRE O MEU MUNDO, A MINHA VISÃO</h1>
          <div class="hero-copy-right">
            <p>Direção criativa, audiovisual, fotografia e estratégia de marca para marcas pessoais modernas.</p>
            <a class="btn" href="sobre">Vem conhcer-me</a>
          </div>
        </div>

        <nav class="nav">
          <a href="fotografia.html">Fotografia</a>
          <a href="design.html">Design</a>
          <a href="video.html">Video</a>
          <a href="sobre.html">Sobre</a>
        </nav>
      </header>

      <section class="services">
        <article class="service-row" id="fotografia">
          <span>01.</span>
          <h2>FOTOGRAFIA</h2>
          <span class="arrow">→</span>
        </article>
        <article class="service-row alt" id="design">
          <span>02.</span>
          <h2>DESIGN</h2>
          <span class="arrow">→</span>
        </article>
        <article class="service-row" id="video">
          <span>03.</span>
          <h2>VIDEO</h2>
          <span class="arrow">→</span>
        </article>
        <article class="service-row alt" id="sobre">
          <span>04.</span>
          <h2>SOBRE MIM</h2>
          <span class="arrow">→</span>
        </article>
      </section>

      <section class="bottom-grid">
        <div class="item">
          <img src="1 (2).jpg" alt="Descrição da minha foto">
        </div>
        <div class="item">
          <img src="1 (3).jpg" alt="Descrição da minha foto">
        </div>
        <div class="item">
          <img src="1 (1).jpg" alt="Descrição da minha foto">
        </div>
      </section>
    </section>
  </main>
</body>
</html>
